version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./backend/crm.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=supersecretkey_crm_hcp_module_109238!@#
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app/backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always
